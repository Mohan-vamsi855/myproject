<!DOCTYPE html>
<html>
<head>
  <title>Crop Recommendation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<div class="container mt-5">
  <h2 class="text-center mb-4">Crop Recommendation</h2>

  <form onsubmit="predict(event)">

    <!-- Row 1 -->
    <div class="row">
      <div class="col-md-4 mb-3">
        <label>Nitrogen (N)</label>
        <input type="number" class="form-control" id="n" required>
      </div>

      <div class="col-md-4 mb-3">
        <label>Phosphorus (P)</label>
        <input type="number" class="form-control" id="p" required>
      </div>

      <div class="col-md-4 mb-3">
        <label>Potassium (K)</label>
        <input type="number" class="form-control" id="k" required>
      </div>
    </div>

    <!-- Row 2 -->
    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Temperature (°C)</label>
        <input type="number" class="form-control" id="temp" required>
      </div>

      <div class="col-md-6 mb-3">
        <label>Humidity (%)</label>
        <input type="number" class="form-control" id="humidity" required>
      </div>
    </div>

    <!-- Row 3 -->
    <div class="row">
      <div class="col-md-6 mb-3">
        <label>pH Level</label>
        <input type="number" step="0.1" class="form-control" id="ph" required>
      </div>

      <div class="col-md-6 mb-3">
        <label>Rainfall (mm)</label>
        <input type="number" class="form-control" id="rainfall" required>
      </div>
    </div>

    <button class="btn btn-success w-100 mt-3">Predict Crop</button>

  </form>

  <!-- RESULT -->
  <div id="result" class="text-center mt-5"></div>

</div>

<script>
function predict(e){
  e.preventDefault();

  let n = document.getElementById("n").value;
  let p = document.getElementById("p").value;
  let k = document.getElementById("k").value;
  let temp = document.getElementById("temp").value;
  let humidity = document.getElementById("humidity").value;
  let ph = document.getElementById("ph").value;
  let rain = document.getElementById("rainfall").value;

  let crop = "";
  let image = "";

  // Simple demo logic (you can replace with ML later)
  if(rain > 200 && humidity > 80){
    crop = "Rice 🌾";
    image = "https://raw.githubusercontent.com/your-repo/images/image1.jpg";
  } else if(temp > 25 && ph > 6){
    crop = "Wheat 🌿";
    image = "https://raw.githubusercontent.com/your-repo/images/image2.jpg";
  } else {
    crop = "Maize 🌽";
    image = "https://raw.githubusercontent.com/your-repo/images/image3.jpg";
  }

  document.getElementById("result").innerHTML = `
    <h4 class="text-success">Recommended Crop: ${crop}</h4>
    <img src="${image}" width="300" class="mt-3 border rounded shadow">
  `;
}
</script>

</body>
</html>
