<!DOCTYPE html>
<html>
<head>
  <title>Rainfall Prediction</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<div class="container mt-5">
  <h2 class="text-center mb-4">Rainfall Prediction</h2>

  <form onsubmit="predict(event)">

    <!-- Location -->
    <div class="mb-3">
      <label>Select Location</label>
      <select class="form-control" id="location">
        <option>Adelaide</option>
        <option>Brisbane</option>
        <option>Canberra</option>
        <option>Darwin</option>
        <option>Melbourne</option>
        <option>Perth</option>
        <option>Sydney</option>
      </select>
    </div>

    <!-- Row 1 -->
    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Min Temperature (°C)</label>
        <input type="number" class="form-control" id="mintemp" required>
      </div>
      <div class="col-md-6 mb-3">
        <label>Max Temperature (°C)</label>
        <input type="number" class="form-control" id="maxtemp" required>
      </div>
    </div>

    <!-- Row 2 -->
    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Rainfall (mm)</label>
        <input type="number" class="form-control" id="rainfall">
      </div>
      <div class="col-md-6 mb-3">
        <label>Evaporation (mm)</label>
        <input type="number" class="form-control">
      </div>
    </div>

    <!-- Row 3 -->
    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Sunshine (hours)</label>
        <input type="number" class="form-control">
      </div>
      <div class="col-md-6 mb-3">
        <label>Wind Gust Speed (km/h)</label>
        <input type="number" class="form-control">
      </div>
    </div>

    <!-- Row 4 -->
    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Wind Speed 9 AM (km/h)</label>
        <input type="number" class="form-control">
      </div>
      <div class="col-md-6 mb-3">
        <label>Wind Speed 3 PM (km/h)</label>
        <input type="number" class="form-control">
      </div>
    </div>

    <!-- Row 5 -->
    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Humidity 9 AM (%)</label>
        <input type="number" class="form-control" id="humidity9">
      </div>
      <div class="col-md-6 mb-3">
        <label>Humidity 3 PM (%)</label>
        <input type="number" class="form-control" id="humidity3">
      </div>
    </div>

    <!-- Row 6 -->
    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Pressure 9 AM (hPa)</label>
        <input type="number" class="form-control">
      </div>
      <div class="col-md-6 mb-3">
        <label>Pressure 3 PM (hPa)</label>
        <input type="number" class="form-control">
      </div>
    </div>

    <!-- Row 7 -->
    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Cloud 9 AM (oktas)</label>
        <input type="number" class="form-control" id="cloud9">
      </div>
      <div class="col-md-6 mb-3">
        <label>Cloud 3 PM (oktas)</label>
        <input type="number" class="form-control" id="cloud3">
      </div>
    </div>

    <!-- Row 8 -->
    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Temperature 9 AM (°C)</label>
        <input type="number" class="form-control">
      </div>
      <div class="col-md-6 mb-3">
        <label>Temperature 3 PM (°C)</label>
        <input type="number" class="form-control">
      </div>
    </div>

    <!-- Row 9 -->
    <div class="mb-3">
      <label>RISK_MM (mm)</label>
      <input type="number" class="form-control">
    </div>

    <button class="btn btn-info w-100 mt-3">Predict</button>

  </form>

  <!-- RESULT -->
  <div id="result" class="text-center mt-5"></div>

</div>

<script>
function predict(e){
  e.preventDefault();

  let rain = parseFloat(document.getElementById("rainfall").value) || 0;
  let humidity = parseFloat(document.getElementById("humidity3").value) || 0;
  let cloud = parseFloat(document.getElementById("cloud3").value) || 0;

  let text = "";

  // Improved logic using multiple fields
  if (rain > 50 || humidity > 85 || cloud > 6) {
    text = "🌧️ Heavy Rain Expected";
  } 
  else if (rain > 10 || humidity > 60 || cloud > 4) {
    text = "🌦️ Moderate Rain Expected";
  } 
  else {
    text = "☀️ No Rain / Low Rain";
  }

  document.getElementById("result").innerHTML = `
    <h4 class="text-success">${text}</h4>
  `;
}
</script>

</body>
</html>
