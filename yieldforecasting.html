<!DOCTYPE html>
<html>
<head>
  <title>Yield Production Forecasting</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<div class="container mt-5">
  <h2 class="text-center mb-4">Yield Production Forecasting</h2>

  <form onsubmit="predict(event)">

    <!-- Row 1 -->
    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Year</label>
        <input type="number" class="form-control" id="year" required>
      </div>

      <div class="col-md-6 mb-3">
        <label>Average Rainfall (mm/year)</label>
        <input type="number" class="form-control" id="rainfall" required>
      </div>
    </div>

    <!-- Row 2 -->
    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Pesticides (tonnes)</label>
        <input type="number" class="form-control" id="pesticides" required>
      </div>

      <div class="col-md-6 mb-3">
        <label>Average Temperature (°C)</label>
        <input type="number" class="form-control" id="temp" required>
      </div>
    </div>

    <!-- Row 3 -->
    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Area (ha)</label>
        <input type="number" class="form-control" id="area" required>
      </div>

      <div class="col-md-6 mb-3">
        <label>Country</label>
        <select class="form-control" id="country">
          <option>Albania</option>
          <option>India</option>
          <option>USA</option>
        </select>
      </div>
    </div>

    <!-- Row 4 -->
    <div class="mb-3">
      <label>Item (Crop)</label>
      <select class="form-control" id="item">
        <option>Cassava</option>
        <option>Wheat</option>
        <option>Rice</option>
        <option>Maize</option>
      </select>
    </div>

    <button class="btn btn-warning w-100 mt-3">Predict Yield</button>

  </form>

  <!-- RESULT -->
  <div id="result" class="text-center mt-5"></div>

</div>

<script>
function predict(e){
  e.preventDefault();

  let rain = parseFloat(document.getElementById("rainfall").value) || 0;
  let area = parseFloat(document.getElementById("area").value) || 0;
  let temp = parseFloat(document.getElementById("temp").value) || 0;
  let pest = parseFloat(document.getElementById("pesticides").value) || 0;
  let crop = document.getElementById("item").value;

  // Simple deterministic formula (same input → same output)
  let baseYield = (rain * 0.002) + (temp * 0.5) + (pest * 0.1);

  // Crop factor
  let cropFactor = 1;
  if(crop === "Rice") cropFactor = 1.2;
  else if(crop === "Wheat") cropFactor = 1.0;
  else if(crop === "Maize") cropFactor = 1.1;
  else if(crop === "Cassava") cropFactor = 0.9;

  // Final yield (tons)
  let totalYield = (baseYield * cropFactor * area).toFixed(2);

  document.getElementById("result").innerHTML = `
    <h4 class="text-warning">${crop} Yield Prediction</h4>
    <h3>${totalYield} Tons</h3>
  `;
}
</script>

</body>
</html>
