<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 bg-secondary">
  <h3>Login</h3>

  <form onsubmit="login(event)">
    <input id="u" class="form-control my-2" placeholder="Username">
    <input id="p" type="password" class="form-control my-2" placeholder="Password">
    <button class="btn btn-success w-100">Login</button>
  </form>

  <p id="msg" class="text-danger"></p>
</div>

<script>
function login(e){
  e.preventDefault();

  let u = document.getElementById("u").value;
  let p = document.getElementById("p").value;

  if(u==="User" && p==="User@123"){
    window.location.href="afterlogin.html";
  } else {
    document.getElementById("msg").innerText="Invalid Credentials";
  }
}
</script>

</body>
</html>
