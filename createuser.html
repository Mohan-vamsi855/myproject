<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 bg-secondary">
  <h3>Create Account</h3>

  <form onsubmit="register(event)">
    <input class="form-control my-2" placeholder="Username" required>
    <input class="form-control my-2" placeholder="Email" required>
    <input type="password" class="form-control my-2" placeholder="Password" required>

    <button class="btn btn-info w-100">Create Account</button>
  </form>

  <p id="msg" class="text-success mt-2"></p>
</div>

<script>
function register(e){
  e.preventDefault();
  document.getElementById("msg").innerText = "Account Created!";
  setTimeout(() => window.location.href="login.html", 1500);
}
</script>

</body>
</html>
